<!doctype html>
<html lang="en">
  <head>
    <title>&lt;model-viewer&gt; template</title>

    <meta name="description" content="&lt;model-viewer&gt; template">

    <link type="text/css" href="./styles.css" rel="stylesheet"/>
  </head>
  <body>
    <!-- <model-viewer> HTML element -->

          <div class="HotspotAnnotation">Guide Rod</div>
      </button><button class="Hotspot" slot="hotspot-5" data-position="2.941811401883456m -3.579527944665755m -2.986442317901516m" data-normal="0.7834156826448282m 0.22065719806701184m -0.5810079768190392m" data-visibility-attribute="visible">

      </button><button class="Hotspot" slot="hotspot-7" data-position="3.2313526825249284m 8.034021036958206m -3.817929904740785m" data-normal="0.5918555743104488m 0.6958782992856511m -0.40676820394539054m" data-visibility-attribute="visible">

      <div class="progress-bar hide" slot="progress-bar">

          View in your space
      </button>
      <div id="ar-prompt">
          <img src="ar_hand_prompt.png">
      </div>
    </model-viewer>  
    <script src="script.js"></script>
    <!-- Loads <model-viewer> for browsers: -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.3.1/model-viewer.min.js"></script>
  </body>
</html>
